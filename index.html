<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Planner">
<meta name="theme-color" content="#0F766E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Meal Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--p:#0D9488;--pl:#CCFBF1;--pd:#0F766E;--text:#1a1a1a;--muted:#666;--border:#e5e7eb;--bg:#f4f7f7;--card:#fff;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--pd);padding:calc(10px + var(--sat)) 16px 10px;color:#fff;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:10px;opacity:.6;margin-top:1px}
.gear-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}

.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
.content{flex:1;padding:12px 12px calc(20px + var(--sab));overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.sec-lbl:first-child{margin-top:2px}
.meal-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;cursor:pointer;user-select:none}
.meal-card.current{border:1.5px solid var(--p)}
.meal-hdr{display:flex;align-items:center;padding:10px 12px;gap:10px}
.meal-photo{width:54px;height:54px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
.meal-photo-fb{width:54px;height:54px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;background:#f5f5f5}
.meal-photo-wrap{position:relative;flex-shrink:0;width:54px;height:54px}
.meal-photo-wrap a{display:block;width:54px;height:54px;border-radius:10px;overflow:hidden;position:relative}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);border-radius:10px}
.meal-info{flex:1;min-width:0}
.meal-cui{font-size:10px;font-weight:600;margin-bottom:1px}
.meal-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nut-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.nt{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.nt-protein{background:#FEE2E2;color:#991B1B}.nt-carb{background:#FEF3C7;color:#92400E}
.nt-vitamin{background:#D1FAE5;color:#065F46}.nt-fiber{background:#EDE9FE;color:#5B21B6}
.nt-calcium{background:#DBEAFE;color:#1E40AF}.nt-lowcal{background:#F0FDF4;color:#166534}
.icon-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn:active{background:var(--pl)}
.icon-btn.star-on{background:#FEF3C7;border-color:#F59E0B}
.meal-body{border-top:1px solid var(--border);padding:12px 14px;display:none}
.meal-body.open{display:block}
.recipe-text{font-size:13px;color:#444;line-height:1.6;margin-bottom:8px}
.ingr-text{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn:active{opacity:.85}
.btn-p{background:var(--p);color:#fff}
.btn-o{background:#fff;color:var(--p);border:1px solid var(--p)}
.badge-fav{background:#FEF3C7;color:#92400E;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.badge-egg{background:#FEF9C3;color:#854D0E;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.la-bar{background:var(--pl);border-radius:14px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(13,148,136,.2);cursor:pointer}
.la-bar:active{opacity:.9}
.la-title{font-size:11px;font-weight:700;color:var(--pd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.la-items{display:flex;gap:8px}
.la-item{flex:1;background:#fff;border-radius:10px;padding:8px 10px;border:1px solid rgba(13,148,136,.15);min-width:0}
.la-when{font-size:10px;color:var(--muted)}
.la-name{font-size:12px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.la-cui{font-size:10px;color:var(--p)}
.day-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border)}
.day-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--p);font-weight:300}
.day-nav-btn:active{background:var(--pl)}
.day-date{text-align:center}
.day-date-main{font-size:15px;font-weight:700}
.day-date-sub{font-size:11px;color:var(--muted);margin-top:1px}
.day-back{font-size:13px;color:var(--p);cursor:pointer;padding:4px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px}
.week-toggle{display:flex;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:3px;margin-bottom:12px;gap:2px}
.week-opt{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);border-radius:9px;cursor:pointer}
.week-opt.active{background:var(--p);color:#fff}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.week-day{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:6px 3px;text-align:center;cursor:pointer;min-height:56px}
.week-day:active{background:var(--pl)}
.week-day.today{border:1.5px solid var(--p)}
.week-day.selected{background:var(--pl);border-color:var(--p)}
.wd-name{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase}
.wd-date{font-size:14px;font-weight:700;margin:3px 0 2px}
.wd-dot{width:5px;height:5px;border-radius:50%;background:var(--p);margin:0 auto;opacity:0}
.week-day.has-plan .wd-dot{opacity:1}
.week-expanded{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.we-hdr{background:#E6F7F5;padding:10px 14px;font-size:14px;font-weight:700;color:#0F5C54;display:flex;align-items:center;justify-content:space-between}
.we-slot{display:flex;align-items:center;padding:10px 14px;gap:10px;border-top:1px solid var(--border);cursor:pointer}
.we-slot:active{background:#f8fffe}
.we-slot-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.we-slot-info{flex:1;min-width:0}
.we-slot-label{font-size:10px;color:var(--muted);font-weight:500}
.we-slot-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.we-swap{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--p);flex-shrink:0}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-bg.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;width:100%;max-width:430px;background:#fff;border-radius:20px 20px 0 0;z-index:201;padding-bottom:calc(16px + var(--sab));transform:translateX(-50%) translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0)}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:16px;font-weight:700;padding:14px 20px 6px}
.sheet-meal-name{font-size:13px;color:var(--muted);padding:0 20px 12px;border-bottom:1px solid var(--border)}
.sheet-action{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.sheet-action:last-child{border-bottom:none}
.sheet-action:active{background:#f8fffe}
.sa-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.sa-text{font-size:14px;font-weight:500}
.sa-sub{font-size:12px;color:var(--muted);margin-top:1px}
.edit-sheet{position:fixed;bottom:0;left:50%;width:100%;max-width:430px;background:#fff;border-radius:20px 20px 0 0;z-index:202;padding-bottom:calc(16px + var(--sab));max-height:90vh;overflow-y:auto;transform:translateX(-50%) translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0)}
.edit-sheet.open{transform:translateX(-50%) translateY(0)}
.edit-field{padding:0 20px 14px}
.edit-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.edit-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:16px;background:#fafafa;color:var(--text)}
.edit-input:focus{outline:none;border-color:var(--p)}
.edit-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:#fafafa;color:var(--text);min-height:80px;resize:none}
.edit-textarea:focus{outline:none;border-color:var(--p)}
.slot-checks{display:flex;gap:8px;flex-wrap:wrap}
.slot-check{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted)}
.slot-check.checked{background:var(--pl);border-color:var(--p);color:var(--pd)}
.freq-opts{display:flex;gap:6px;flex-wrap:wrap}
.freq-opt{padding:7px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted)}
.freq-opt.sel{background:var(--p);border-color:var(--p);color:#fff}
.edit-save{width:calc(100% - 40px);margin:4px 20px 0;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:block}
.manual-input-wrap{padding:14px 20px}
.manual-search{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:16px;background:#fafafa;color:var(--text)}
.manual-search:focus{outline:none;border-color:var(--p)}
.manual-results{margin-top:10px;max-height:280px;overflow-y:auto}
.manual-result{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.manual-result:last-child{border-bottom:none}
.manual-result:active{opacity:.7}
.mr-icon{font-size:20px;width:30px;text-align:center}
.mr-name{font-size:14px;font-weight:600}
.mr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.db-topbar{display:flex;gap:8px;margin-bottom:10px}
.db-search{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:16px;background:var(--card);color:var(--text)}
.db-search:focus{outline:none;border-color:var(--p)}
.btn-add-sm{background:var(--p);color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.slot-grp{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.slot-hdr{display:flex;align-items:center;padding:11px 14px;cursor:pointer;gap:10px;background:#E6F7F5;user-select:none}
.slot-hdr:active{background:#d4f1ed}
.slot-emoji{font-size:16px;flex-shrink:0}
.slot-title{flex:1;font-size:14px;font-weight:600;color:#0F5C54}
.slot-count{font-size:12px;color:#0F766E;background:rgba(13,148,136,.12);border-radius:20px;padding:2px 9px}
.slot-chev{font-size:11px;color:#0D9488;transition:transform .2s}
.slot-chev.open{transform:rotate(90deg)}
.slot-items{display:none;background:var(--card)}
.slot-items.open{display:block}
.db-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border)}
.db-row:last-child{border-bottom:none}
.db-photo{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
.db-photo-fb{width:42px;height:42px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:#f5f5f5}
.db-info{flex:1;min-width:0}
.db-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-sub{font-size:11px;color:var(--muted);margin-top:1px}
.db-acts{display:flex;align-items:center;gap:4px;flex-shrink:0}
.like-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.like-btn.liked{background:#D1FAE5;border-color:#6EE7B7}
.like-btn.disliked{background:#FEE2E2;border-color:#FCA5A5}
.rm-btn{width:28px;height:28px;border-radius:50%;border:1px solid #fca5a5;background:#fff0f0;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:#dc2626}
.add-card{background:var(--card);border:1.5px dashed var(--p);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.add-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--bg);color:var(--text);margin-bottom:10px}
.add-input:focus{outline:none;border-color:var(--p)}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-sel{flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text)}
.add-row-btns{display:flex;gap:8px}
.btn-save{background:var(--p);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.btn-cancel{background:#fff;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:14px;cursor:pointer}
.about-card{background:var(--pd);border-radius:16px;padding:22px 20px;text-align:center;color:#fff;margin-bottom:16px}
.about-name{font-size:18px;font-weight:700}
.about-ver{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;font-size:11px;margin-top:10px}
.s-grp{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.s-row{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer}
.s-row:last-child{border-bottom:none}
.s-row:active{background:#f4faf9}
.s-row.notap{cursor:default}.s-row.notap:active{background:transparent}
.s-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-lbl{flex:1}.s-title{font-size:14px;font-weight:500}.s-sub{font-size:12px;color:var(--muted);margin-top:1px}
.s-right{font-size:13px;color:var(--muted);flex-shrink:0}.s-chev{font-size:15px;color:#ccc}
.sw{width:44px;height:26px;border-radius:13px;background:#ddd;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--p)}
.sw::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{left:21px}
.s-inp{border:none;outline:none;font-size:14px;color:var(--text);text-align:right;background:transparent;width:140px}
.s-inp::placeholder{color:#bbb}
.toast-wrap{position:fixed;bottom:calc(24px + var(--sab));left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:400}
.toast{background:#134e4a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.install-bar{background:var(--pd);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:12px}
.install-bar button{background:rgba(255,255,255,.25);border:none;border-radius:8px;color:#fff;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0}
.install-bar .ix{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;padding:0 2px;cursor:pointer;margin-left:0}
.back-nav{display:flex;align-items:center;gap:8px;padding:0 0 12px;cursor:pointer;color:var(--p);font-size:14px;font-weight:500}
.info-section{margin-bottom:18px}
.info-section-title{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.info-text{flex:1;padding-top:1px}
.info-title{font-size:13px;font-weight:600;color:var(--text)}
.info-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
@keyframes swapspin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.spinning svg{animation:swapspin .4s ease}
input,select,textarea{font-size:16px}
</style>
</head>
<body>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>
<div id="installBar" class="install-bar" style="display:none">
  <span>📲 Add to Home Screen for the full app experience</span>
  <button onclick="showInstallHelp()">How?</button>
  <button class="ix" onclick="this.parentElement.style.display='none'">×</button>
</div>
<div class="hdr">
  <div class="hdr-row">
    <div class="hdr-title">Meal Planner</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="gear-btn" onclick="openInfoSheet()" title="What can this app do?" style="background:rgba(255,255,255,0.12)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8" stroke-width="3"/><line x1="12" y1="12" x2="12" y2="16"/>
        </svg>
      </button>
      <div id="modeTag" style="background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer" onclick="switchTab('settings',null)" title="Tap to manage family sharing">Solo</div>
      <button class="gear-btn" onclick="switchTab('settings',null)">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>

const configured = !firebaseConfig.apiKey.startsWith('REPLACE');
let auth, db;

if (configured) {
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db   = getFirestore(app);
}

window.FB = {
  configured,

  signInWithGoogle: async () => {
    if (!auth) return null;
    try {
      const r = await signInWithPopup(auth, new GoogleAuthProvider());
      return r.user;
    } catch(e) { window.fbToast('Sign-in failed: ' + e.message); return null; }
  },

  signOut: async () => { if (auth) await signOut(auth); },

  onAuthChange: (cb) => { if (auth) onAuthStateChanged(auth, cb); },

  getUserData: async (uid) => {
    if (!db) return null;
    const s = await getDoc(doc(db, 'users', uid));
    return s.exists() ? s.data() : null;
  },

  saveUser: async (uid, data) => {
    if (!db) return;
    await setDoc(doc(db, 'users', uid), data, { merge: true });
  },

  getHousehold: async (code) => {
    if (!db) return null;
    const s = await getDoc(doc(db, 'households', code));
    return s.exists() ? s.data() : null;
  },

  createHousehold: async (code, member) => {
    if (!db) return;
    await setDoc(doc(db, 'households', code), {
      code, members: [member], createdAt: Date.now()
    });
  },

  addMemberToHousehold: async (code, member) => {
    if (!db) return;
    const s = await getDoc(doc(db, 'households', code));
    if (!s.exists()) return { error: 'Household not found. Check the code.' };
    const data = s.data();
    if (!data.members.some(m => m.uid === member.uid)) {

    }

    if (!db) return () => {};
    return onSnapshot(doc(db, 'plans', code), snap => cb(snap.exists() ? snap.data() : {}));
  },

  savePlan: async (code, data) => {
    if (!db || !code) return;
    await setDoc(doc(db, 'plans', code), data, { merge: true });
  },
};

// Fire auth change once Firebase is ready
if (configured && auth) {

function getCurSlot(){const h=new Date().getHours();if(h>=6&&h<11)return'breakfast';if(h>=11&&h<15)return'lunch';if(h>=15&&h<19)return'snacks';return'dinner';}
function getPool(slot){return meals.filter(m=>m.type===slot&&S.likedItems[m.id]!=='disliked'&&!(m.hasEgg&&!S.eggsOn));}
function getPK(d,slot){return dKey(d)+'_'+slot;}
function getPickForDate(date,slot){
  const k=getPK(date,slot);
  if(S.picks[k]!=null){const pid=S.picks[k]&&S.picks[k].id!=null?S.picks[k].id:S.picks[k];const m=meals.find(x=>x.id===pid);if(m)return m;}
  const dow=getDOW(date);const pk=dow+'_'+slot;
  if(S.weekPlan[pk]){const m=meals.find(x=>x.id===S.weekPlan[pk]);if(m){S.picks[k]=m;return m;}}
  const pool=getPool(slot);if(!pool.length)return null;
  const favs=pool.filter(m=>m.fav||S.starredItems[m.id]);
  const src=(Math.random()<0.7&&favs.length)?favs:pool;
  const picked=src[Math.floor(Math.random()*src.length)];
  S.picks[k]=picked;return picked;
}
function setPickForDate(date,slot,meal){S.picks[getPK(date,slot)]=meal;saveState();}

function addPullDown(sheetId, closeFn){
  var sheet = document.getElementById(sheetId);
  if(!sheet || sheet._pullDown) return;
  sheet._pullDown = true;
  var startY=0, curY=0, dragging=false;
  sheet.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;curY=startY;dragging=true;},{passive:true});
  sheet.addEventListener('touchmove',function(e){
    if(!dragging)return;
    curY=e.touches[0].clientY;
    var dy=curY-startY;
    if(dy>0) sheet.style.transform='translateX(-50%) translateY('+dy+'px)';
  },{passive:true});
  sheet.addEventListener('touchend',function(){
    dragging=false;
    if(curY-startY>90){closeFn();}
    else{sheet.style.transform='';}
  },{passive:true});
}

function renderWeek(){
  
  const today=new Date();today.setHours(0,0,0,0);
  const monday=addD(getMon(today),S.weekOffset*7);
  let html=`<div class="week-toggle">
    <div class="week-opt${S.weekOffset===0?' active':''}" onclick="S.weekOffset=0;S.selectedDay=null;render()">This week</div>
    <div class="week-opt${S.weekOffset===1?' active':''}" onclick="S.weekOffset=1;S.selectedDay=null;render()">Next week</div>
  </div><div class="week-grid">`;
  for(let i=0;i<7;i++){
    const d=addD(monday,i);const dk=dKey(d);const isToday=dk===dKey(today);const isSel=S.selectedDay===i;
    const hasPlan=mealSlots.some(s=>S.picks[getPK(d,s)]||S.weekPlan[getDOW(d)+'_'+s]);
    html+=`<div class="week-day${isToday?' today':''}${isSel?' selected':''}${hasPlan?' has-plan':''}" onclick="S.selectedDay=S.selectedDay===${i}?null:${i};render()">
      <div class="wd-name">${DOW_N[i]}</div><div class="wd-date">${d.getDate()}</div><div class="wd-dot"></div></div>`;
  }
  html+=`</div>`;
  if(S.selectedDay!==null){
    const selDate=addD(monday,S.selectedDay);const dow=getDOW(selDate);
    const selLabel=dKey(selDate)===dKey(today)?'Today':DOW_F[S.selectedDay]+', '+fmtD(selDate,true);
    html+=`<div class="week-expanded"><div class="we-hdr"><span>${selLabel}</span></div>`;
    mealSlots.forEach(slot=>{
      const meal=getPickForDate(selDate,slot);
      html+=`<div class="we-slot" onclick="openSheet('${slot}',new Date('${dKey(selDate)}T12:00:00'))">
        <div class="we-slot-icon">${slotEmoji[slot]}</div>
        <div class="we-slot-info"><div class="we-slot-label">${mealLabels[slot]}</div><div class="we-slot-name">${meal?meal.name:'Tap to set'}</div></div>
        <div class="we-swap">${swapSVG}</div>
      </div>`;
    });
    html+=`<div style="padding:12px 14px;border-top:1px solid var(--border)">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📌 Set as weekly template for every ${DOW_F[dow]}</div>
      ${mealSlots.map(slot=>{const meal=getPickForDate(selDate,slot);const pk=dow+'_'+slot;const isSet=S.weekPlan[pk]&&S.weekPlan[pk]===(meal&&meal.id);
        return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px">
          <span>${slotEmoji[slot]} ${meal?meal.name:'—'}</span>
          <span style="color:${isSet?'var(--p)':'#bbb'};cursor:pointer;font-size:12px;font-weight:600;padding:4px 8px;background:${isSet?'var(--pl)':'transparent'};border-radius:8px" onclick="setWeekTemplate('${pk}',${meal?meal.id:0},${isSet})">${isSet?'✓ In template':'+ Set template'}</span>
        </div>`;
      }).join('')}
    </div></div>`;
  } else {
    html+=`<div style="font-size:12px;color:var(--muted);text-align:center;padding:6px 0 10px">Tap a day to view and edit meals</div>`;
    for(let i=0;i<7;i++){
      const d=addD(monday,i);const isToday=dKey(d)===dKey(today);
      html+=`<div style="background:var(--card);border-radius:12px;border:1.5px solid ${isToday?'var(--p)':'var(--border)'};padding:10px 14px;margin-bottom:8px;cursor:pointer" onclick="S.selectedDay=${i};render()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:${isToday?'var(--p)':'var(--text)'}">${DOW_F[i]}, ${fmtD(d,true)}</span>
          <span style="font-size:12px;color:var(--muted)">›</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${mealSlots.map(slot=>{const m=getPickForDate(d,slot);return m?`<span style="font-size:11px;background:var(--pl);color:var(--pd);padding:2px 8px;border-radius:10px">${m.name}</span>`:''}).join('')}
        </div>
      </div>`;
    }
  }
  return html;
}

function renderDatabase(){
  
  const search=window._dbSearch||'';
  const BK='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>';
  let html='<div class="back-nav" onclick="switchTab(\'today\',document.querySelector(\'.tab\'))">'+BK+' Back</div>';
  if(S.showAddForm){
    html+=`<div class="add-card">
      <div style="font-size:14px;font-weight:600;color:var(--pd);margin-bottom:10px">+ Add new dish</div>
      <input id="newName" class="add-input" placeholder="Dish name"/>
      <input id="newRecipe" class="add-input" placeholder="Recipe"/>
      <input id="newIngr" class="add-input" placeholder="Ingredients"/>
      <input id="newUrl" class="add-input" placeholder="YouTube / Instagram URL (optional)" type="url"/>
      <div class="add-row">
        <select id="newType" class="add-sel"><option value="breakfast">Breakfast</option><option value="lunch">Lunch</option><option value="snacks">Snacks</option><option value="dinner">Dinner</option></select>
        <select id="newCuisine" class="add-sel">${cuisines.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      </div>
      <div class="add-row-btns"><button class="btn-save" onclick="addNewItem()">Save</button><button class="btn-cancel" onclick="S.showAddForm=false;render()">Cancel</button></div>
    </div>`;
  }else{
    html+=`<div class="db-topbar"><input class="db-search" placeholder="🔍 Search dishes..." oninput="window._dbSearch=this.value;render()" value="${search}" id="dbSearch"/><button class="btn-add-sm" onclick="S.showAddForm=true;render()">+ Add</button></div>`;
  }
  mealSlots.forEach(slot=>{
    const sm=meals.filter(m=>m.type===slot&&(!search||m.name.toLowerCase().includes(search.toLowerCase()))&&!(m.hasEgg&&!S.eggsOn));
    const open=S.expandedSlots[slot];
    html+=`<div class="slot-grp"><div class="slot-hdr" onclick="S.expandedSlots['${slot}']=!S.expandedSlots['${slot}'];render()"><span class="slot-emoji">${slotEmoji[slot]}</span><span class="slot-title">${mealLabels[slot]}</span><span class="slot-count">${sm.length}</span><span class="slot-chev${open?' open':''}">▶</span></div>
    <div class="slot-items${open?' open':''}">
    ${sm.length===0?`<div style="padding:12px 14px;font-size:13px;color:var(--muted)">No items</div>`:sm.map(m=>{
      const lk=S.likedItems[m.id];const cc=cColors[m.cuisine]||'#888';const ed=S.mealEdits[m.id]||{};const url=photos[m.name];
      return`<div class="db-row">
        ${url?`<img class="db-photo" src="${url}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy"/><div class="db-photo-fb" style="display:none">${m.icon}</div>`:`<div class="db-photo-fb">${m.icon}</div>`}
        <div class="db-info"><div class="db-name">${m.name}${S.starredItems[m.id]?' ⭐':''}${m.hasEgg?'<span class="badge-egg" style="margin-left:4px">🥚</span>':''}${ed.url?' 🎥':''}</div>
        <div class="db-sub" style="color:${cc}">${m.cuisine} · ${ed.freq?freqL[ed.freq]:'Weekly'}</div></div>
        <div class="db-acts">
          <div class="like-btn${lk==='liked'?' liked':''}" onclick="S.likedItems[${m.id}]='liked';saveState();render()">👍</div>
          <div class="like-btn${lk==='disliked'?' disliked':''}" onclick="S.likedItems[${m.id}]='disliked';saveState();render()">👎</div>
          <div class="rm-btn" onclick="removeMeal(${m.id})">×</div>
        </div>
      </div>`;
    }).join('')}</div></div>`;
  });
  return html;
}

function addNewItem(){
  const name=document.getElementById('newName').value.trim();const type=document.getElementById('newType').value;const cuisine=document.getElementById('newCuisine').value;const recipe=document.getElementById('newRecipe').value.trim();const ingredients=document.getElementById('newIngr').value.trim();const url=document.getElementById('newUrl').value.trim();
  if(!name){toast('Please enter a dish name');return;}
  const id=nextId++;
  meals.push({id,name,type,cuisine,icon:gI(name),recipe,ingredients,hasEgg:hE(name,ingredients),liked:true,fav:false,timesCooked:0,isCustom:true});
  S.likedItems[id]='liked';if(url)S.mealEdits[id]={url,slots:[type],freq:'weekly'};
  S.showAddForm=false;S.expandedSlots[type]=true;saveState();toast('✅ '+name+' added!');render();
}
function removeMeal(id){if(!confirm('Remove this item?'))return;meals=meals.filter(m=>m.id!==id);delete S.likedItems[id];if(!S.removedIds)S.removedIds=[];S.removedIds.push(id);Object.keys(S.picks).forEach(k=>{if(S.picks[k]&&(S.picks[k].id===id||S.picks[k]===id))delete S.picks[k];});saveState();toast('Removed');render();}

function renderSettings(){
  var bk='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>';
  var googleIcon='<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#4285F4" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#34A853" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';

  var h = '';

  h += '<div class="back-nav" onclick="switchTab(\'today\',document.querySelector(\'.tab\'))">'+bk+' Back</div>';

  // ── About card ──
  h += '<div class="about-card"><div class="about-name">Meal Planner</div><div class="about-ver">Version 2.1 &middot; '+meals.length+' recipes</div></div>';

  h += '<div class="sec-lbl">Account &amp; Family</div><div class="s-grp">';

    h += '<div class="s-row" onclick="googleSignIn()">'
      + '<div class="s-ico" style="background:#FEE2E2">'+googleIcon+'</div>'

      + '<span class="s-chev">›</span></div>';

      + '<div class="s-ico" style="background:#CCFBF1">ℹ️</div>'
      + '<div class="s-lbl"><div class="s-title">Why do I need to sign in?</div></div>'
      + '<span class="s-chev">›</span></div>';
  } else {
    h += '<div class="s-row notap">'
      + '<div class="s-ico" style="background:#D1FAE5">✓</div>'
      + '<div class="s-lbl"><div class="s-title">'+S.userName+'</div><div class="s-sub">'+S.userEmail+'</div></div></div>';
    h += '<div class="s-row" onclick="showHouseholdPanel()">'
      + '<div class="s-ico" style="background:#CCFBF1">👨‍👩‍👧</div>'
      + '<div class="s-lbl"><div class="s-title">'+(S.householdCode?'Household: '+S.householdCode:'Set up family sharing')+'</div>'
      + '<div class="s-sub">'+(S.householdCode?S.householdMembers.length+' member(s) · Tap to manage':'Create or join a household')+'</div></div>'
      + '<span class="s-chev">›</span></div>';
    h += '<div class="s-row" onclick="signOutUser()">'
      + '<div class="s-ico" style="background:#FEE2E2">↩️</div>'
      + '<div class="s-lbl"><div class="s-title">Sign out</div></div>'
      + '<span class="s-chev">›</span></div>';
  }
  h += '</div>';

  // ── Preferences ──
  h += '<div class="sec-lbl">Preferences</div><div class="s-grp">'
    + '<div class="s-row notap"><div class="s-ico" style="background:#FEF3C7">🥚</div>'
    + '<div class="s-lbl"><div class="s-title">Include egg recipes</div><div class="s-sub">Show dishes with eggs in suggestions</div></div>'
    + '<div class="sw'+(S.eggsOn?' on':'')+'" onclick="S.eggsOn=!S.eggsOn;saveState();render()"></div></div>'
    + '</div>';

  // ── Cook details ──
  h += '<div class="sec-lbl">Cook details</div><div class="s-grp">'
    + '<div class="s-row notap"><div class="s-ico" style="background:#EDE9FE">👨‍🍳</div>'
    + '<div class="s-lbl"><div class="s-title">Cook\'s name</div><div class="s-sub">Used in WhatsApp messages</div></div>'
    + '<input class="s-inp" placeholder="e.g. Ramesh bhai" value="'+S.cookName+'" oninput="S.cookName=this.value" onblur="saveState()"/></div>'
    + '<div class="s-row notap"><div class="s-ico" style="background:#D1FAE5">📱</div>'
    + '<div class="s-lbl"><div class="s-title">Cook\'s WhatsApp</div><div class="s-sub">Number with country code</div></div>'
    + '<input class="s-inp" placeholder="+91 98765 43210" value="'+S.cookPhone+'" oninput="S.cookPhone=this.value" onblur="saveState()" type="tel"/></div>'
    + '</div>';

  // ── App ──
  h += '<div class="sec-lbl">App</div><div class="s-grp">'
    + '<div class="s-row" onclick="showInstallHelp()"><div class="s-ico" style="background:#CCFBF1">📲</div>'
    + '<div class="s-lbl"><div class="s-title">Add to Home Screen</div><div class="s-sub">Install as iPhone app — open in Safari first</div></div>'
    + '<span class="s-chev">›</span></div>'
    + '<div class="s-row" onclick="if(navigator.share)navigator.share({title:\'Meal Planner\',url:location.href});else toast(\'Copy the URL to share!\')">'
    + '<div class="s-ico" style="background:#DBEAFE">🔗</div>'

    + '</div>';

  // ── About ──
  h += '<div class="sec-lbl">About</div><div class="s-grp">'

function render(){const a=document.getElementById('contentArea');if(S.currentTab==='today')a.innerHTML=renderToday();else if(S.currentTab==='week')a.innerHTML=renderWeek();else if(S.currentTab==='database')a.innerHTML=renderDatabase();else a.innerHTML=renderSettings();}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS&&!window.navigator.standalone)setTimeout(()=>{document.getElementById('installBar').style.display='flex';},2000);
mealSlots.forEach(s=>getPickForDate(new Date(),s));

function fixTabsTop(){
  var hdr=document.querySelector('.hdr');
  var tabs=document.getElementById('tabBar');

}
render();
fixTabsTop();
