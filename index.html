<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Khana">
<meta name="theme-color" content="#0F766E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Khana Kya Hai?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{
  --primary:#0D9488;--pl:#CCFBF1;--pd:#0F766E;
  --text:#1a1a1a;--muted:#666;--border:#e5e7eb;--bg:#f8fafa;--card:#fff;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* Header */
.hdr{background:var(--pd);padding:calc(14px + var(--sat)) 16px 12px;color:#fff;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text .logo-main{font-size:16px;font-weight:700;letter-spacing:-0.3px;display:block}
.logo-text .logo-sub{font-size:10px;opacity:0.65;letter-spacing:0.3px;display:block;margin-top:1px}
.gear-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none}
.time-chip{background:rgba(255,255,255,0.15);border-radius:10px;padding:3px 10px;font-size:11px;margin-top:8px;display:inline-block}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Scrollable content */
.content{flex:1;padding:12px 12px calc(24px + var(--sab));overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.sec-lbl:first-child{margin-top:2px}

/* Meal cards */
.meal-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.meal-card.current{border:1.5px solid var(--primary)}
.meal-card:active{opacity:.95}
.meal-hdr{display:flex;align-items:center;padding:10px 12px;gap:10px}
.meal-photo{width:54px;height:54px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
.meal-photo-fb{width:54px;height:54px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.meal-info{flex:1;min-width:0}
.meal-cui{font-size:10px;font-weight:600;margin-bottom:1px}
.meal-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nut-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.nt{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.nt-protein{background:#FEE2E2;color:#991B1B}.nt-carb{background:#FEF3C7;color:#92400E}
.nt-vitamin{background:#D1FAE5;color:#065F46}.nt-fiber{background:#EDE9FE;color:#5B21B6}
.nt-calcium{background:#DBEAFE;color:#1E40AF}.nt-iron{background:#FEE2E2;color:#7F1D1D}
.nt-lowcal{background:#F0FDF4;color:#166534}
.icon-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.icon-btn:active{background:var(--pl)}
.icon-btn.star-on{background:#FEF3C7;border-color:#F59E0B}
.meal-body{border-top:1px solid var(--border);padding:12px 14px;display:none}
.meal-body.open{display:block}
.recipe-text{font-size:13px;color:#444;line-height:1.6;margin-bottom:8px}
.ingr-text{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.btn:active{opacity:.85}
.btn-p{background:var(--primary);color:#fff}
.btn-o{background:#fff;color:var(--primary);border:1px solid var(--primary)}

/* Look-ahead */
.la-bar{background:var(--pl);border-radius:14px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(13,148,136,.2)}
.la-title{font-size:11px;font-weight:700;color:var(--pd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.la-items{display:flex;gap:8px}
.la-item{flex:1;background:#fff;border-radius:10px;padding:8px 10px;border:1px solid rgba(13,148,136,.15);min-width:0}
.la-when{font-size:10px;color:var(--muted)}
.la-name{font-size:12px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.la-cui{font-size:10px;color:var(--primary)}

.badge-fav{background:#FEF3C7;color:#92400E;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.badge-egg{background:#FEF9C3;color:#854D0E;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}

/* Completed */
.comp-item{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.comp-tick{width:28px;height:28px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.manual-btn{background:var(--pl);border:1px dashed var(--primary);border-radius:12px;padding:16px;text-align:center;cursor:pointer;color:var(--pd);font-size:13px;font-weight:500;margin-top:8px}

/* My Menu */
.db-topbar{display:flex;gap:8px;margin-bottom:10px}
.db-search{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:16px;background:var(--card);color:var(--text);-webkit-appearance:none}
.db-search:focus{outline:none;border-color:var(--primary)}
.btn-add{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-appearance:none}

/* Add form */
.add-card{background:var(--card);border:1.5px dashed var(--primary);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.add-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.add-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--bg);color:var(--text);margin-bottom:10px;-webkit-appearance:none}
.add-input:focus{outline:none;border-color:var(--primary)}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-sel{flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);-webkit-appearance:none}
.add-row-btns{display:flex;gap:8px}
.btn-save{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.btn-cancel{background:#fff;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:14px;cursor:pointer}

/* Slot groups */
.slot-grp{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.slot-hdr{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;background:#E6F7F5;user-select:none}
.slot-hdr:active{background:#d4f1ed}
.slot-emoji{font-size:16px;flex-shrink:0}
.slot-title{flex:1;font-size:14px;font-weight:600;color:#0F5C54}
.slot-count{font-size:12px;color:#0F766E;background:rgba(13,148,136,.12);border-radius:20px;padding:2px 9px}
.slot-chev{font-size:11px;color:#0D9488;transition:transform .2s}
.slot-chev.open{transform:rotate(90deg)}
.slot-items{display:none;background:var(--card)}
.slot-items.open{display:block}
.db-row{display:flex;align-items:center;padding:11px 14px;gap:10px;border-bottom:1px solid var(--border)}
.db-row:last-child{border-bottom:none}
.db-photo{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
.db-photo-fb{width:42px;height:42px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:#f5f5f5}
.db-info{flex:1;min-width:0}
.db-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-sub{font-size:11px;color:var(--muted);margin-top:1px}
.db-acts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.like-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.like-btn:active{opacity:.7}
.like-btn.liked{background:#D1FAE5;border-color:#6EE7B7}
.like-btn.disliked{background:#FEE2E2;border-color:#FCA5A5}
.rm-btn{width:30px;height:30px;border-radius:50%;border:1px solid #fca5a5;background:#fff0f0;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:#dc2626;line-height:1}

/* Settings */
.about-card{background:var(--pd);border-radius:16px;padding:24px 20px;text-align:center;color:#fff;margin-bottom:16px}
.about-logo-wrap{width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.about-name{font-size:18px;font-weight:700}
.about-tagline{font-size:12px;opacity:.7;margin-top:3px}
.about-ver{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;font-size:11px;margin-top:12px}
.s-grp{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.s-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer}
.s-row:last-child{border-bottom:none}
.s-row:active{background:#f4faf9}
.s-row.notap{cursor:default}
.s-row.notap:active{background:transparent}
.s-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.s-lbl{flex:1}
.s-title{font-size:14px;font-weight:500}
.s-sub{font-size:12px;color:var(--muted);margin-top:2px}
.s-right{font-size:13px;color:var(--muted);flex-shrink:0}
.s-chev{font-size:15px;color:#ccc}
.sw{width:44px;height:26px;border-radius:13px;background:#ddd;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--primary)}
.sw::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{left:21px}
.s-inp{border:none;outline:none;font-size:14px;color:var(--text);text-align:right;background:transparent;width:140px}
.s-inp::placeholder{color:#bbb}

/* Toast — uses in-flow positioning to avoid fixed */
.toast-anchor{position:relative;height:0}
.toast-float{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#134e4a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast-float.show{opacity:1}

/* Install prompt banner */
.install-bar{background:var(--pd);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px}
.install-bar button{background:rgba(255,255,255,.25);border:none;border-radius:8px;color:#fff;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0}
.install-bar .close-x{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;padding:0 4px;cursor:pointer;margin-left:0}

@keyframes swapspin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.spinning svg{animation:swapspin .4s ease}

/* iOS input zoom fix */
input,select,textarea{font-size:16px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8 2 5 5 5 9c0 2.5 1.2 4.7 3 6.1V17h8v-1.9c1.8-1.4 3-3.6 3-6.1 0-4-3-7-7-7z" fill="white" opacity="0.95"/>

      <div class="logo-text">
        <span class="logo-main">Khana Kya Hai?</span>

    <button class="gear-btn" onclick="switchTab('settings',null)">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>

      </svg>
    </button>
  </div>
  <div class="time-chip" id="timeChip"></div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" onclick="switchTab('upcoming',this)">Today</div>
  <div class="tab" onclick="switchTab('completed',this)">Completed</div>
  <div class="tab" onclick="switchTab('database',this)">My Menu</div>
</div>

<div class="content" id="contentArea">
  <div class="toast-anchor"><div class="toast-float" id="toast"></div></div>
</div>

<script>
// ── State (persisted to localStorage) ─────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('khana_state') || '{}'); } catch(e) { return {}; }
}
function saveState() {
  try { localStorage.setItem('khana_state', JSON.stringify({
    eggsOn: S.eggsOn, cookName: S.cookName, cookPhone: S.cookPhone,
    starredItems: S.starredItems, likedItems: S.likedItems,
    completedMeals: S.completedMeals, picks: S.picks,
    customMeals: meals.filter(m => m.isCustom),
    removedIds: S.removedIds,
  })); } catch(e) {}
}

const saved = loadState();

const S = {
  eggsOn: saved.eggsOn || false,
  cookName: saved.cookName || '',
  cookPhone: saved.cookPhone || '',
  currentTab: 'upcoming',
  expandedCards: {},
  expandedSlots: { breakfast:true, lunch:true, snacks:true, dinner:true },
  starredItems: saved.starredItems || {},
  likedItems: saved.likedItems || {},
  showAddForm: false,
  picks: saved.picks || {},
  removedIds: saved.removedIds || [],
  completedMeals: saved.completedMeals || [
    { name:'Poha', when:'Today, Breakfast', icon:'🌾' },
    { name:'Dal Dhokli', when:'Today, Lunch', icon:'🫕' },
  ],
};

// ── Helpers ───────────────────────────────────────────────────────────────
function guessCuisine(name,ingr){const n=(name+' '+ingr).toLowerCase();if(/dosa|idli|sambar|upma/.test(n))return'South Indian';if(/pav bhaji|bhel/.test(n))return'Maharashtrian';if(/dal dhokli|dhokla|thepla|kadhi/.test(n))return'Gujarati';if(/pasta|pizza/.test(n))return'Italian';if(/manchurian|lemon rice/.test(n))return'Indo-chinese';if(/taco|burrito/.test(n))return'Mexican';return'North Indian';}
function guessIcon(name){const n=name.toLowerCase();if(/smoothie|shake/.test(n))return'🥤';if(/omelette|egg|bhurji/.test(n))return'🍳';if(/pancake|cheela|chilla|dosa/.test(n))return'🥞';if(/paratha|roti|bread|sandwich|wrap|frankie|burger/.test(n))return'🫓';if(/pasta/.test(n))return'🍝';if(/rice|biryani/.test(n))return'🍚';if(/chaat|sprout|salad/.test(n))return'🥗';if(/yogurt|parfait/.test(n))return'🍦';if(/dal|curry|sabzi|matar|gobi|masala|kofta|palak/.test(n))return'🫕';if(/samosa/.test(n))return'🔺';if(/paneer/.test(n))return'🧀';if(/corn/.test(n))return'🌽';if(/hummus/.test(n))return'🫙';return'🥘';}
function hasEggFn(name,ingr){return/egg|omelette|bhurji|pancake/i.test(name+' '+ingr);}
function guessNut(name,ingr){const t=(name+' '+ingr).toLowerCase();const tags=[];if(/paneer|egg|protein|moong|chana|sprout|dal|yogurt|greek|nut|peanut|edamame/.test(t))tags.push('protein');if(/rice|pasta|bread|roti|paratha|oat|wheat|dosa|idli|potato|aloo|bhaji/.test(t))tags.push('carb');if(/spinach|palak|carrot|vegetable|veggie|tomato|bell pepper|cucumber|fruit|berry/.test(t))tags.push('vitamin');if(/sprout|moong|chana|bean|lentil|dal|oat|flax|chia/.test(t))tags.push('fiber');if(/yogurt|paneer|cheese|milk/.test(t))tags.push('calcium');if(/spinach|palak|moong|chana|bean/.test(t))tags.push('iron');if(/chaat|salad|stir.?fry|smoothie/.test(t))tags.push('lowcal');return[...new Set(tags)].slice(0,3);}

// ── Core logic ────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getCurrentSlot() {
  const h = new Date().getHours();
  if (h>=6&&h<11) return 'breakfast';
  if (h>=11&&h<15) return 'lunch';
  if (h>=15&&h<19) return 'snacks';
  return 'dinner';
}

function getPool(slot) {
  return meals.filter(m => m.type===slot && S.likedItems[m.id]!=='disliked' && !(m.hasEgg&&!S.eggsOn));
}

function pickForSlot(slot) {
  const pool = getPool(slot);
  if (!pool.length) return null;
  const favs = pool.filter(m => m.fav || S.starredItems[m.id]);
  const src = (Math.random()<0.7 && favs.length) ? favs : pool;
  return src[Math.floor(Math.random()*src.length)];
}

function ensurePicks() {
  mealSlots.forEach(slot => {
    const cur = S.picks[slot];
    if (!cur || !getPool(slot).find(m => m.id===cur.id)) {
      S.picks[slot] = pickForSlot(slot);
    }
  });
}

function getPick(slot) {
  return S.picks[slot] || meals.find(m => m.type===slot) || meals[0];
}

function photoTag(name, cls) {
  const url = photos[name];
  const fb = guessIcon(name);
  if (url) return `<img class="${cls}" src="${url}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy"/><div class="${cls}-fb" style="display:none">${fb}</div>`;
  return `<div class="${cls}-fb">${fb}</div>`;
}

function getNutTags(m) {
  return guessNut(m.name, m.ingredients||'').map(t=>`<span class="nt ${nutClass[t]}">${nutLabels[t]}</span>`).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  S.currentTab = tab;
  S.expandedCards = {};
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tb = document.getElementById('tabBar');
  if (tab==='settings') { tb.style.display='none'; }
  else { tb.style.display='flex'; if(el) el.classList.add('active'); }
  render();
}

function toggleCard(slot) { S.expandedCards[slot]=!S.expandedCards[slot]; render(); }
function toggleSlot(slot) { S.expandedSlots[slot]=!S.expandedSlots[slot]; render(); }

function swapMeal(slot, e) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 420);
  const pool = getPool(slot);
  const cur = S.picks[slot];
  const others = pool.filter(m => !cur || m.id!==cur.id);
  const src = others.length ? others : pool;
  S.picks[slot] = src[Math.floor(Math.random()*src.length)];
  saveState();
  toast('✦ New suggestion!');
  render();
}

function toggleStar(id, e) {
  e.stopPropagation();
  S.starredItems[id] = !S.starredItems[id];
  saveState();
  toast(S.starredItems[id] ? '⭐ Added to favourites' : 'Removed from favourites');
  render();
}

function setLike(id, val) { S.likedItems[id]=val; saveState(); render(); }

function removeMeal(id) {
  if (!confirm('Remove this item from your menu?')) return;
  meals = meals.filter(m => m.id!==id);
  delete S.likedItems[id];
  if (!S.removedIds) S.removedIds = [];
  S.removedIds.push(id);
  mealSlots.forEach(s => { if(S.picks[s]&&S.picks[s].id===id) S.picks[s]=null; });
  ensurePicks();
  saveState();
  toast('Removed');
  render();
}

function toggleEggs() { S.eggsOn=!S.eggsOn; S.picks={}; ensurePicks(); saveState(); render(); }

function sendWA(id, e) {
  if (e) e.stopPropagation();
  const m = meals.find(x=>x.id===id);
  if (!m) return;
  const cook = S.cookName ? `\n\nPlease cook this for us, ${S.cookName}! 🙏` : '';
  const msg = encodeURIComponent(`*🍽 ${m.name}* (${m.cuisine})\n\n📜 ${m.recipe}\n🧺 ${m.ingredients}${cook}\n\n_Sent from Khana Kya Hai_`);
  const base = S.cookPhone ? `https://wa.me/${S.cookPhone.replace(/\D/g,'')}` : 'https://wa.me/';
  window.open(base+'?text='+msg, '_blank');
}

function addNewItem() {
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const cuisine = document.getElementById('newCuisine').value;
  const recipe = document.getElementById('newRecipe').value.trim();
  const ingredients = document.getElementById('newIngr').value.trim();
  if (!name) { toast('Please enter a dish name'); return; }
  const id = nextId++;
  const meal = {id,name,type,cuisine,icon:guessIcon(name),recipe,ingredients,hasEgg:hasEggFn(name,ingredients),liked:true,fav:false,timesCooked:0,isCustom:true};
  meals.push(meal);
  S.likedItems[id] = 'liked';
  S.showAddForm = false;
  S.expandedSlots[type] = true;
  saveState();
  toast('✅ '+name+' added!');
  render();
}

function manualAdd() {
  const name = prompt('What did you cook?');
  if (name) { S.completedMeals.unshift({name,when:'Today, just now',icon:'🍽'}); saveState(); render(); toast('✅ Added: '+name); }
}

function renderUpcoming() {
  const now = new Date();
  document.getElementById('timeChip').textContent =
    `🕐 ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}  ·  ${now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}`;
  ensurePicks();
  const cur = getCurrentSlot();
  const next = []; let si=mealSlots.indexOf(cur)+1, day=0;
  while(next.length<2){if(si>=mealSlots.length){si=0;day++;}next.push({slot:mealSlots[si],meal:getPick(mealSlots[si]),dayLabel:['Today','Tomorrow','Day after'][day]||'Upcoming'});si++;}

  let html = `<div class="toast-anchor"><div class="toast-float" id="toast"></div></div>
  <div class="la-bar"><div class="la-title">👀 Coming up next</div><div class="la-items">`;
  next.forEach(la => {
    html += `<div class="la-item"><div class="la-when">${la.dayLabel} · ${mealLabels[la.slot]}</div><div class="la-name">${la.meal?la.meal.name:'—'}</div><div class="la-cui">${la.meal?la.meal.cuisine:''}</div></div>`;
  });
  html += `</div></div>`;

  mealSlots.forEach(slot => {
    const isCur = slot===cur;
    const meal = getPick(slot);
    if (!meal) return;
    const exp = S.expandedCards[slot];
    const isStar = S.starredItems[meal.id];
    const cc = cuisineColors[meal.cuisine]||'#888';
    html += `<div class="sec-lbl">${slotEmoji[slot]} ${mealLabels[slot]}${isCur?' <span style="color:var(--primary);font-weight:700">· Now</span>':''}</div>
    <div class="meal-card${isCur?' current':''}" onclick="toggleCard('${slot}')">
      <div class="meal-hdr">
        ${photoTag(meal.name,'meal-photo')}
        <div class="meal-info">
          <div class="meal-cui" style="color:${cc}">${meal.cuisine}</div>
          <div class="meal-name">${meal.name}${isStar?'<span class="badge-fav">⭐ Fav</span>':''}${meal.hasEgg?'<span class="badge-egg">🥚</span>':''}</div>
          <div class="nut-tags">${getNutTags(meal)}</div>
        </div>
        <div class="icon-acts">
          <div class="icon-btn${isStar?' star-on':''}" onclick="toggleStar(${meal.id},event)" style="font-size:16px;color:${isStar?'#F59E0B':'#bbb'}">★</div>
          <div class="icon-btn" onclick="swapMeal('${slot}',event)" style="color:var(--primary)">${swapSVG}</div>
        </div>
      </div>
      ${exp?`<div class="meal-body open">
        <p class="recipe-text">📜 ${meal.recipe}</p>
        ${meal.ingredients?`<p class="ingr-text">🧺 ${meal.ingredients}</p>`:''}
        <div class="act-row">
          <button class="btn btn-p" onclick="sendWA(${meal.id},event)">📲 Send to Cook</button>
          <button class="btn btn-o" onclick="event.stopPropagation();toast('Recipe editing coming soon!')">✏️ Edit</button>
        </div>
      </div>`:''}
    </div>`;
  });
  return html;
}

function renderCompleted() {
  return `<div class="toast-anchor"><div class="toast-float" id="toast"></div></div>
  <div class="sec-lbl">✅ Cooked today</div>
  ${S.completedMeals.length ? S.completedMeals.map(m=>`<div class="comp-item"><div class="comp-tick">✓</div><div><div style="font-size:13px;font-weight:600">${m.icon} ${m.name}</div><div style="font-size:11px;color:var(--muted)">${m.when}</div></div></div>`).join('') : `<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">🍽</div><div>Nothing logged yet today</div></div>`}
  <div class="manual-btn" onclick="manualAdd()">+ Add what you cooked manually</div>
  <div class="sec-lbl" style="margin-top:18px">📅 Earlier this week</div>
  <div class="comp-item"><div class="comp-tick">✓</div><div><div style="font-size:13px;font-weight:600">🥞 Masala Dosa</div><div style="font-size:11px;color:var(--muted)">Yesterday, Breakfast</div></div></div>
  <div class="comp-item"><div class="comp-tick">✓</div><div><div style="font-size:13px;font-weight:600">🍛 Rajma Chawal</div><div style="font-size:11px;color:var(--muted)">Yesterday, Lunch</div></div></div>`;
}

function renderDatabase() {
  const search = window._dbSearch||'';
  let html = `<div class="toast-anchor"><div class="toast-float" id="toast"></div></div>`;
  if (S.showAddForm) {
    html += `<div class="add-card">
      <div style="font-size:14px;font-weight:600;color:var(--pd);margin-bottom:12px">+ Add new dish</div>
      <label class="add-label">Dish name</label>
      <input id="newName" class="add-input" placeholder="e.g. Matar Paneer"/>
      <label class="add-label">Recipe</label>
      <input id="newRecipe" class="add-input" placeholder="How to make it..."/>
      <label class="add-label">Ingredients</label>
      <input id="newIngr" class="add-input" placeholder="Comma separated ingredients"/>
      <div class="add-row">
        <select id="newType" class="add-sel"><option value="breakfast">Breakfast</option><option value="lunch">Lunch</option><option value="snacks">Snacks</option><option value="dinner">Dinner</option></select>
        <select id="newCuisine" class="add-sel">${cuisines.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      </div>
      <div class="add-row-btns">
        <button class="btn-save" onclick="addNewItem()">Save dish</button>
        <button class="btn-cancel" onclick="S.showAddForm=false;render()">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<div class="db-topbar">
      <input class="db-search" placeholder="🔍 Search dishes..." oninput="window._dbSearch=this.value;render()" value="${search}" id="dbSearch"/>
      <button class="btn-add" onclick="S.showAddForm=true;render()">+ Add</button>
    </div>`;
  }
  mealSlots.forEach(slot => {
    const slotMeals = meals.filter(m => m.type===slot && (!search||m.name.toLowerCase().includes(search.toLowerCase())));
    const open = S.expandedSlots[slot];
    html += `<div class="slot-grp">
      <div class="slot-hdr" onclick="toggleSlot('${slot}')">
        <span class="slot-emoji">${slotEmoji[slot]}</span>
        <span class="slot-title">${mealLabels[slot]}</span>
        <span class="slot-count">${slotMeals.length}</span>
        <span class="slot-chev${open?' open':''}">▶</span>
      </div>
      <div class="slot-items${open?' open':''}">
      ${slotMeals.length===0?`<div style="padding:12px 14px;font-size:13px;color:var(--muted)">No items found</div>`:
        slotMeals.map(m=>{
          const lk=S.likedItems[m.id];const cc=cuisineColors[m.cuisine]||'#888';
          return`<div class="db-row">
            ${photoTag(m.name,'db-photo')}
            <div class="db-info">
              <div class="db-name">${m.name}${S.starredItems[m.id]?' ⭐':''}${m.hasEgg?'<span class="badge-egg" style="margin-left:4px">🥚</span>':''}</div>
              <div class="db-sub" style="color:${cc}">${m.cuisine} · Cooked ${m.timesCooked}x</div>
            </div>
            <div class="db-acts">
              <div class="like-btn${lk==='liked'?' liked':''}" onclick="setLike(${m.id},'liked')">👍</div>
              <div class="like-btn${lk==='disliked'?' disliked':''}" onclick="setLike(${m.id},'disliked')">👎</div>
              <div class="rm-btn" onclick="removeMeal(${m.id})">×</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return html;
}

function renderSettings() {
  document.getElementById('timeChip').textContent = 'Settings';
  return `<div class="toast-anchor"><div class="toast-float" id="toast"></div></div>
  <div class="about-card">
    <div class="about-logo-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8 2 5 5 5 9c0 2.5 1.2 4.7 3 6.1V17h8v-1.9c1.8-1.4 3-3.6 3-6.1 0-4-3-7-7-7z" fill="white" opacity="0.95"/>
        <path d="M9 17v1a3 3 0 006 0v-1H9z" fill="white" opacity="0.6"/>
        <circle cx="12" cy="9" r="2.2" fill="#0D9488"/>
      </svg>
    </div>
    <div class="about-name">Khana Kya Hai?</div>
    <div class="about-tagline">Your friendly meal planner</div>
    <div class="about-ver">Version 1.0.0 · ${meals.length} recipes</div>
  </div>
  <div class="sec-lbl">Preferences</div>
  <div class="s-grp">
    <div class="s-row notap">
      <div class="s-ico" style="background:#FEF3C7">🥚</div>
      <div class="s-lbl"><div class="s-title">Include egg recipes</div><div class="s-sub">Show dishes with eggs in suggestions</div></div>
      <div class="sw${S.eggsOn?' on':''}" onclick="toggleEggs()"></div>
    </div>
  </div>
  <div class="sec-lbl">Cook details</div>
  <div class="s-grp">
    <div class="s-row notap">
      <div class="s-ico" style="background:#EDE9FE">👨‍🍳</div>
      <div class="s-lbl"><div class="s-title">Cook's name</div><div class="s-sub">Used in WhatsApp messages</div></div>
      <input class="s-inp" placeholder="e.g. Ramesh bhai" value="${S.cookName}" oninput="S.cookName=this.value" onblur="saveState()"/>
    </div>
    <div class="s-row notap">
      <div class="s-ico" style="background:#D1FAE5">📱</div>
      <div class="s-lbl"><div class="s-title">Cook's WhatsApp</div><div class="s-sub">Number with country code</div></div>
      <input class="s-inp" placeholder="+91 98765 43210" value="${S.cookPhone}" oninput="S.cookPhone=this.value" onblur="saveState()" type="tel"/>
    </div>
  </div>
  <div class="sec-lbl">App</div>
  <div class="s-grp">
    <div class="s-row" onclick="showInstallHelp()">
      <div class="s-ico" style="background:#CCFBF1">📲</div>
      <div class="s-lbl"><div class="s-title">Add to Home Screen</div><div class="s-sub">Install as iPhone app</div></div>
      <span class="s-chev">›</span>
    </div>
    <div class="s-row" onclick="if(navigator.share)navigator.share({title:'Khana Kya Hai?',url:location.href});else toast('Copy the URL to share!')">
      <div class="s-ico" style="background:#DBEAFE">🔗</div>
      <div class="s-lbl"><div class="s-title">Share app</div><div class="s-sub">Invite family to use this planner</div></div>
      <span class="s-chev">›</span>
    </div>
  </div>
  <div class="sec-lbl">About</div>
  <div class="s-grp">
    <div class="s-row notap"><div class="s-ico" style="background:#F0FDF4">🏷</div><div class="s-lbl"><div class="s-title">Version</div></div><div class="s-right">1.0.0</div></div>
    <div class="s-row notap"><div class="s-ico" style="background:#FEF3C7">🌿</div><div class="s-lbl"><div class="s-title">Diet mode</div></div><div class="s-right" style="color:var(--primary);font-weight:500">Pure Vegetarian</div></div>
    <div class="s-row notap"><div class="s-ico" style="background:#CCFBF1">🗂</div><div class="s-lbl"><div class="s-title">Recipes in database</div></div><div class="s-right">${meals.length} items</div></div>
    <div class="s-row" onclick="switchTab('upcoming',document.querySelector('.tab'))">
      <div class="s-ico" style="background:#FEE2E2">🏠</div>
      <div class="s-lbl"><div class="s-title">Back to planner</div></div>
      <span class="s-chev">›</span>
    </div>
  </div>`;
}

function render() {
  const a = document.getElementById('contentArea');
  if (S.currentTab==='upcoming') a.innerHTML = renderUpcoming();
  else if (S.currentTab==='completed') a.innerHTML = renderCompleted();
  else if (S.currentTab==='database') a.innerHTML = renderDatabase();
  else a.innerHTML = renderSettings();
}

// ── Init ──────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Show install banner on iOS Safari if not standalone
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => { document.getElementById('installBar').style.display='flex'; }, 1500);
}

ensurePicks();
render();
</script>
</body>
</html>
